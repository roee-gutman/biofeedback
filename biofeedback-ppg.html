<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>ביופידבק · PPG</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+Hebrew:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#080c10; --surface:#0f1520; --border:#1a2535;
  --red:#ff3b5c; --red-dim:#ff3b5c33;
  --green:#00e5a0; --green-dim:#00e5a022;
  --teal:#00d4aa; --blue:#38bdf8; --purple:#a78bfa;
  --amber:#ffb830; --text:#dde6f0; --muted:#4a6070;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans Hebrew',sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}

/* ── header ── */
header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a1018 0%,transparent 100%);flex-shrink:0}
header h1{font-size:17px;font-weight:700;letter-spacing:.5px}
header h1 span{color:var(--red)}
.hdr-right{display:flex;align-items:center;gap:10px}
.ppg-badge{font-size:10px;letter-spacing:1.5px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);color:var(--muted);transition:all .3s}
.ppg-badge.live{border-color:var(--red);color:var(--red);background:var(--red-dim);animation:pulse .8s infinite}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:all .3s}
.status-dot.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── tabs ── */
.tabs{display:flex;padding:10px 16px 0;gap:4px;flex-shrink:0}
.tab{flex:1;padding:8px 0;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s;font-family:'Noto Sans Hebrew',sans-serif}
.tab.active{background:#00d4aa22;border-color:var(--teal);color:var(--teal)}

/* ── main ── */
main{flex:1;padding:14px 16px 90px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}

/* panels */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px}
.panel-title{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}

/* ── PPG finger panel ── */
.finger-wrap{display:flex;align-items:center;gap:14px}
.finger-icon{width:64px;height:64px;border-radius:50%;background:var(--bg);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;transition:all .3s}
.finger-icon.active{border-color:var(--red);box-shadow:0 0 24px var(--red-dim);animation:hb .9s infinite}
@keyframes hb{0%,100%{transform:scale(1)}35%{transform:scale(1.07)}65%{transform:scale(1.03)}}
.finger-info{flex:1}
.finger-info .fi-label{font-size:12px;color:var(--muted);line-height:1.5}
.finger-info .fi-label.active{color:var(--text)}
.signal-bar-wrap{margin-top:6px;height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.signal-bar{height:100%;width:0%;border-radius:4px;transition:width .5s,background .5s;background:var(--muted)}

/* ── BPM hero ── */
.bpm-hero{text-align:center;padding:8px 0 4px}
.bpm-num{font-family:'Space Mono',monospace;font-size:68px;font-weight:700;line-height:1;transition:color .4s}
.bpm-unit{font-size:12px;color:var(--muted);letter-spacing:2px;margin-top:2px}
.bpm-tag{font-size:11px;margin-top:5px;letter-spacing:1px}

/* ── waveform ── */
#waveformCanvas{width:100%;height:64px;display:block;border-radius:6px}

/* ── metrics grid ── */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mc{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.mc .mc-lbl{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.mc .mc-val{font-family:'Space Mono',monospace;font-size:20px;font-weight:700}
.mc .mc-sub{font-size:9px;color:var(--muted);margin-top:2px}

/* ── HR history chart ── */
#hrCanvas{width:100%;height:70px;display:block;border-radius:6px}

/* ── breathing circle ── */
.breath-wrap{display:flex;justify-content:center;padding:10px 0}
.breath-outer{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center}
.breath-ring{position:absolute;border-radius:50%;border:1px solid;transition:all 80ms linear}
.breath-core{border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all 80ms linear}
.bc-phase{font-size:11px;letter-spacing:2px;font-weight:600}
.bc-count{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--text)}

/* ── pattern buttons ── */
.pattern-list{display:flex;flex-direction:column;gap:6px}
.pat-btn{padding:9px 12px;border-radius:8px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:12px;cursor:pointer;text-align:right;transition:all .15s;display:flex;justify-content:space-between;align-items:center;font-family:'Noto Sans Hebrew',sans-serif}
.pat-btn.sel{background:#00d4aa18;border-color:var(--teal);color:var(--teal)}
.pat-btn.disabled{opacity:.35;cursor:not-allowed}
.pat-mono{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)}

/* ── stress gauge ── */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}

/* ── session log ── */
.session-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--bg);border-radius:8px;font-size:11px}
.session-rows{display:flex;flex-direction:column;gap:6px}

/* ── breath progress bar ── */
.breath-prog-wrap{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px}
.breath-prog{height:100%;border-radius:3px;transition:width 80ms linear}

/* ── HRV sync indicator ── */
.sync-banner{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;font-size:11px;line-height:1.4}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── FAB ── */
.fab-area{position:fixed;bottom:0;left:0;right:0;padding:14px 20px 20px;background:linear-gradient(0deg,var(--bg) 60%,transparent);display:flex;gap:10px;z-index:99}
.fab{flex:1;padding:14px;border-radius:50px;border:none;font-family:'Noto Sans Hebrew',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .25s;letter-spacing:.5px}
.fab-ppg{background:linear-gradient(135deg,var(--red),#c0143c);color:#fff;box-shadow:0 6px 24px #ff3b5c44}
.fab-ppg.off{background:#1e293b;color:var(--muted);box-shadow:none}
.fab-breath{background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;box-shadow:0 6px 24px #00d4aa44}
.fab-breath.off{background:#1e293b;color:var(--muted);box-shadow:none}

/* hidden */
#videoEl{display:none}
#canvasEl{display:none}

/* torch warning */
.torch-warn{font-size:11px;color:var(--amber);padding:8px 10px;background:#1a140055;border:1px solid #ffb83033;border-radius:8px;line-height:1.5;display:none}
.torch-warn.show{display:block}

/* recommendation box */
.rec-box{padding:10px 12px;border-radius:10px;font-size:12px;line-height:1.6}
</style>
</head>
<body>

<header>
  <h1>ביו<span>פידבק</span> · PPG</h1>
  <div class="hdr-right">
    <span class="ppg-badge" id="ppgBadge">PPG כבוי</span>
    <div class="status-dot" id="statusDot"></div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="ppg">❤️ קצב לב</button>
  <button class="tab" data-tab="breath">🫁 נשימה</button>
  <button class="tab" data-tab="data">📊 נתונים</button>
</div>

<main id="mainArea">
  <!-- injected by JS -->
</main>

<!-- hidden camera elements -->
<video id="videoEl" playsinline muted autoplay></video>
<canvas id="canvasEl" width="1" height="1"></canvas>

<div class="fab-area">
  <button class="fab fab-ppg off" id="fabPPG">📷 התחל PPG</button>
  <button class="fab fab-breath off" id="fabBreath">▶ נשימה</button>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════
const state = {
  // PPG
  ppgRunning: false,
  stream: null, track: null,
  redBuf: [], tsBuf: [],
  waveBuf: [],
  bpmHistory: [],
  bpm: null, bpmMin: null, bpmMax: null,
  signalQ: 0,
  ppgElapsed: 0,
  ppgTimer: null, ppgAF: null,

  // Biometrics (real where available, estimated otherwise)
  hr: null,          // from PPG
  hrHistory: [],
  hrv: null,         // estimated from RR intervals
  stress: 65,        // estimated
  stressHistory: Array.from({length:30}, ()=>62+Math.random()*10),
  coherence: 2.1,
  spo2: 98,

  // Breathing
  breathRunning: false,
  pattern: 'Coherent',
  breathPhase: 'inhale',
  breathProgress: 0,
  breathElapsed: 0,
  breathAF: null,
  breathTimer: null,
  breathSessions: [],
  breathStartStress: 65,

  // UI
  tab: 'ppg',
};

const PATTERNS = {
  '4-7-8':    {inhale:4, hold:7, exhale:8,  label:'4-7-8 (הרגעה עמוקה)'},
  'Box':      {inhale:4, hold:4, exhale:4,  label:'Box Breathing (איזון)'},
  'Coherent': {inhale:5, hold:0, exhale:5,  label:'Coherent (HRV אופטימלי)'},
  '2-1-4':    {inhale:2, hold:1, exhale:4,  label:'2-1-4 (הרגעה מהירה)'},
};

// ══════════════════════════════════════════════════════════════════
// DOM HELPERS
// ══════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const lerp = (a,b,t) => a+(b-a)*t;
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const fmt = (n,d=0) => Number(n).toFixed(d);
function median(arr){ const s=[...arr].sort((a,b)=>a-b); const m=Math.floor(s.length/2); return s.length%2?s[m]:Math.round((s[m-1]+s[m])/2); }
function stdDev(arr){ const m=arr.reduce((a,b)=>a+b,0)/arr.length; return Math.sqrt(arr.reduce((a,v)=>a+(v-m)**2,0)/arr.length); }

// ══════════════════════════════════════════════════════════════════
// RENDER TABS
// ══════════════════════════════════════════════════════════════════
function render() {
  const main = $('mainArea');
  if (state.tab === 'ppg')    main.innerHTML = tplPPG();
  if (state.tab === 'breath') main.innerHTML = tplBreath();
  if (state.tab === 'data')   main.innerHTML = tplData();
  attachHandlers();
  if (state.tab === 'ppg' && state.ppgRunning) scheduleWaveRedraw();
  if (state.tab === 'data') drawHRChart();
}

// ── PPG tab ──────────────────────────────────────────────────────
function tplPPG() {
  const bpmColor = !state.bpm ? 'var(--muted)'
    : state.bpm < 60 ? 'var(--blue)'
    : state.bpm < 100 ? 'var(--green)'
    : state.bpm < 120 ? 'var(--amber)' : 'var(--red)';
  const bpmZone = !state.bpm ? '' : state.bpm<60?'קצב נמוך':state.bpm<100?'✓ תקין':state.bpm<120?'גבוה':'⚠ גבוה מאוד';
  const qColor = state.signalQ<15?'var(--muted)':state.signalQ<35?'var(--amber)':'var(--green)';
  const qLabel = state.signalQ<5?'אין אצבע':state.signalQ<15?'חלש':state.signalQ<35?'בינוני':'טוב ✓';

  return `
  <div class="panel">
    <div class="panel-title">חיישן PPG · מצלמה + פלאש</div>
    <div class="finger-wrap">
      <div class="finger-icon ${state.ppgRunning?'active':''}" id="fingerIcon">☝️</div>
      <div class="finger-info">
        <div class="fi-label ${state.ppgRunning?'active':''}" id="fingerLabel">
          ${state.ppgRunning ? 'הנח אצבע על העדשה האחורית' : 'לחץ "התחל PPG" כדי למדוד'}
        </div>
        <div class="signal-bar-wrap" style="margin-top:6px">
          <div class="signal-bar" id="signalBar" style="width:${state.signalQ}%;background:${qColor}"></div>
        </div>
        <div style="font-size:10px;color:${qColor};margin-top:3px">${state.ppgRunning?`אות: ${state.signalQ}% · ${qLabel}`:''}</div>
      </div>
    </div>
    <div class="torch-warn ${state.torchWarn?'show':''}" id="torchWarn">⚠ הפלאש לא הופעל — ודא Chrome Android + הרשאת מצלמה</div>
  </div>

  <div class="panel">
    <div class="panel-title">קצב לב · BPM</div>
    <div class="bpm-hero">
      <div class="bpm-num" style="color:${bpmColor}">${state.bpm||'--'}</div>
      <div class="bpm-unit">BPM</div>
      <div class="bpm-tag" style="color:${bpmColor}">${bpmZone}</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">גל PPG · אות גולמי</div>
    <canvas id="waveformCanvas"></canvas>
  </div>

  <div class="metrics-grid">
    <div class="mc">
      <div class="mc-lbl">אמינות אות</div>
      <div class="mc-val" style="color:${qColor}">${state.ppgRunning?state.signalQ+'%':'--'}</div>
      <div class="mc-sub">${state.ppgRunning?qLabel:'ממתין'}</div>
    </div>
    <div class="mc">
      <div class="mc-lbl">זמן מדידה</div>
      <div class="mc-val" style="color:var(--text)">${state.ppgElapsed}s</div>
      <div class="mc-sub">${state.ppgElapsed>=15?'✓ מספיק':'נדרש 15s'}</div>
    </div>
    <div class="mc">
      <div class="mc-lbl">HR גבוה</div>
      <div class="mc-val" style="color:var(--amber)">${state.bpmMax||'--'}</div>
      <div class="mc-sub">bpm</div>
    </div>
    <div class="mc">
      <div class="mc-lbl">HR נמוך</div>
      <div class="mc-val" style="color:var(--blue)">${state.bpmMin||'--'}</div>
      <div class="mc-sub">bpm</div>
    </div>
  </div>

  ${state.bpm && state.breathRunning ? `
  <div class="sync-banner" style="background:var(--teal)18;border:1px solid var(--teal)44">
    <div class="sync-dot" style="background:var(--teal);box-shadow:0 0 8px var(--teal)"></div>
    <span style="color:var(--teal);font-size:11px">PPG + נשימה פעילים · עקוב אחר ירידת HR במהלך הסשן</span>
  </div>` : ''}

  <div class="panel" style="font-size:12px;color:var(--muted);line-height:1.7">
    <div class="panel-title">הוראות</div>
    <ol style="padding-right:16px;display:flex;flex-direction:column;gap:5px">
      <li>לחץ "התחל PPG" ואשר גישה למצלמה</li>
      <li>הנח קצה אצבע על עדשת המצלמה האחורית</li>
      <li>כסה את העדשה לחלוטין — אל תלחץ חזק מדי</li>
      <li>החזק יציב ~15 שניות</li>
      <li>הפעל גם נשימה מונחית ועקוב אחר ה-HR</li>
    </ol>
  </div>`;
}

// ── Breathing tab ────────────────────────────────────────────────
function tplBreath() {
  const pat = PATTERNS[state.pattern];
  const phaseColor = state.breathPhase==='inhale'?'var(--teal)':state.breathPhase==='hold'?'var(--purple)':'var(--blue)';
  const phaseLabel = state.breathPhase==='inhale'?'שאיפה':state.breathPhase==='hold'?'החזקה':'נשיפה';
  const scale = state.breathPhase==='inhale' ? lerp(.55,1,state.breathProgress)
    : state.breathPhase==='hold' ? 1
    : lerp(1,.55,state.breathProgress);

  const rings = [1,.84,.68];
  const ringsHTML = rings.map((r,i)=>`
    <div class="breath-ring" style="width:${180*r*scale}px;height:${180*r*scale}px;border-color:${phaseColor};opacity:${.12+i*.09};${i===0?`box-shadow:0 0 30px ${phaseColor}33`:''};left:${90-90*r*scale}px;top:${90-90*r*scale}px"></div>
  `).join('');

  const coreSize = 110*scale;
  const countSec = Math.ceil(
    state.breathPhase==='inhale' ? pat.inhale*(1-state.breathProgress)
    : state.breathPhase==='hold' ? pat.hold*(1-state.breathProgress)
    : pat.exhale*(1-state.breathProgress)
  );

  const bpmDelta = state.bpm && state.breathRunning
    ? `HR: <span style="color:${state.bpm<75?'var(--green)':'var(--amber)';}">${state.bpm} bpm</span>`
    : state.bpm ? `HR: <span style="color:var(--muted)">${state.bpm} bpm</span>` : '';

  return `
  <div class="panel">
    <div class="panel-title">תבנית נשימה</div>
    <div class="pattern-list">
      ${Object.entries(PATTERNS).map(([k,p])=>`
        <button class="pat-btn ${state.pattern===k?'sel':''} ${state.breathRunning&&state.pattern!==k?'disabled':''}"
          data-pat="${k}" id="pat-${k}">
          <span>${p.label}</span>
          <span class="pat-mono">${p.inhale}/${p.hold}/${p.exhale}</span>
        </button>`).join('')}
    </div>
  </div>

  <div class="panel" style="position:relative;overflow:hidden">
    <div class="panel-title" style="display:flex;justify-content:space-between">
      <span>מעגל נשימה</span>
      ${bpmDelta ? `<span style="font-size:10px">${bpmDelta}</span>` : ''}
    </div>
    <div class="breath-wrap">
      <div class="breath-outer" id="breathOuter">
        ${state.breathRunning ? ringsHTML : ''}
        <div class="breath-core" style="width:${state.breathRunning?coreSize:90}px;height:${state.breathRunning?coreSize:90}px;background:radial-gradient(circle at 38% 38%,${phaseColor}44,${phaseColor}18);border:2px solid ${phaseColor};box-shadow:0 0 40px ${phaseColor}33">
          ${state.breathRunning
            ? `<span class="bc-phase" style="color:${phaseColor};font-size:10px">${phaseLabel}</span><span class="bc-count">${countSec}</span>`
            : `<span style="font-size:28px">🫁</span>`}
        </div>
      </div>
    </div>
    ${state.breathRunning ? `<div class="breath-prog-wrap"><div class="breath-prog" style="width:${state.breathProgress*100}%;background:${phaseColor}"></div></div>` : ''}
  </div>

  ${state.breathRunning ? `
  <div class="metrics-grid">
    <div class="mc">
      <div class="mc-lbl">משך סשן</div>
      <div class="mc-val" style="color:var(--teal)">${state.breathElapsed}s</div>
    </div>
    <div class="mc">
      <div class="mc-lbl">קוהרנטיות</div>
      <div class="mc-val" style="color:var(--purple)">${fmt(state.coherence,1)}</div>
      <div class="mc-sub">${state.coherence>4?'✓ גבוהה':'~בינונית'}</div>
    </div>
  </div>` : ''}

  ${state.breathSessions.length ? `
  <div class="panel">
    <div class="panel-title">היסטוריית סשנים</div>
    <div class="session-rows">
      ${state.breathSessions.slice(-4).reverse().map(s=>`
        <div class="session-row">
          <span style="color:var(--muted)">${s.time}</span>
          <span>${s.pattern} · ${s.dur}s</span>
          <span style="color:var(--teal);font-family:'Space Mono',monospace">-${s.reduction}% לחץ</span>
        </div>`).join('')}
    </div>
  </div>` : ''}`;
}

// ── Data tab ─────────────────────────────────────────────────────
function tplData() {
  const stressColor = state.stress<40?'var(--green)':state.stress<65?'var(--amber)':'var(--red)';
  const stressLabel = state.stress<40?'נמוך':state.stress<65?'בינוני':'גבוה';
  const gaugeAngle = -135 + state.stress*2.7;

  const rec = state.stress>65
    ? '🔴 לחץ גבוה — הפעל נשימת 4-7-8 למשך 5 דקות'
    : state.stress>40
    ? '🟡 לחץ בינוני — נסה Box Breathing ל-5 מחזורים'
    : '🟢 לחץ נמוך — המשך Coherent Breathing לשמירת HRV';
  const recColor = state.stress>65?'#1a080a':state.stress>40?'#1a1200':'#001a12';
  const recBorder = state.stress>65?'#ff3b5c33':state.stress>40?'#ffb83033':'#00e5a033';

  return `
  <div class="panel">
    <div class="panel-title">רמת לחץ</div>
    <div class="gauge-wrap">
      <svg width="180" height="110" viewBox="0 0 180 110">
        <path d="M20 100 A70 70 0 0 1 160 100" fill="none" stroke="var(--border)" stroke-width="10" stroke-linecap="round"/>
        <path d="M20 100 A70 70 0 0 1 160 100" fill="none" stroke="url(#gg)" stroke-width="10" stroke-linecap="round" stroke-dasharray="${state.stress*2.2} 220"/>
        <defs>
          <linearGradient id="gg" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="var(--teal)"/>
            <stop offset="50%" stop-color="var(--amber)"/>
            <stop offset="100%" stop-color="var(--red)"/>
          </linearGradient>
        </defs>
        <g transform="rotate(${gaugeAngle},90,100)">
          <line x1="90" y1="100" x2="90" y2="42" stroke="${stressColor}" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="90" cy="100" r="5" fill="${stressColor}"/>
        </g>
        <text x="90" y="87" text-anchor="middle" fill="var(--text)" font-size="22" font-family="Space Mono,monospace" font-weight="700">${fmt(state.stress)}</text>
        <text x="90" y="102" text-anchor="middle" fill="${stressColor}" font-size="11" font-family="sans-serif">${stressLabel}</text>
      </svg>
    </div>
    <canvas id="hrCanvas" style="margin-top:8px"></canvas>
  </div>

  <div class="metrics-grid">
    <div class="mc">
      <div class="mc-lbl">קצב לב</div>
      <div class="mc-val" style="color:var(--red)">${state.bpm||'--'}</div>
      <div class="mc-sub">bpm · PPG אמיתי</div>
    </div>
    <div class="mc">
      <div class="mc-lbl">HRV</div>
      <div class="mc-val" style="color:var(--purple)">${state.hrv||'--'}</div>
      <div class="mc-sub">ms · מוערך</div>
    </div>
    <div class="mc">
      <div class="mc-lbl">SpO₂</div>
      <div class="mc-val" style="color:var(--blue)">${fmt(state.spo2)}</div>
      <div class="mc-sub">%</div>
    </div>
    <div class="mc">
      <div class="mc-lbl">קוהרנטיות</div>
      <div class="mc-val" style="color:var(--teal)">${fmt(state.coherence,1)}</div>
      <div class="mc-sub">/10</div>
    </div>
  </div>

  <div class="rec-box" style="background:${recColor};border:1px solid ${recBorder}">
    <div style="font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">המלצה</div>
    <div style="font-size:12px;line-height:1.6">${rec}</div>
  </div>

  <div class="panel" style="font-size:11px;color:var(--muted);line-height:1.7">
    <div class="panel-title">על המדדים</div>
    <p><strong style="color:var(--text)">HR מ-PPG</strong> — מדידה אמיתית דרך המצלמה והפלאש. דם אדום בולע אור באופן פולסטורי.</p>
    <p style="margin-top:6px"><strong style="color:var(--text)">HRV</strong> — שונות בין פעימות. מחושב מ-RR intervals של ה-PPG. ערך גבוה = מצב עצבי מאוזן.</p>
    <p style="margin-top:6px"><strong style="color:var(--text)">לחץ</strong> — מוערך על בסיס HR ו-HRV. אינו מחליף מדידה קלינית.</p>
  </div>`;
}

// ══════════════════════════════════════════════════════════════════
// WAVEFORM DRAWING
// ══════════════════════════════════════════════════════════════════
function drawWave() {
  const c = $('waveformCanvas');
  if (!c) return;
  const dpr = window.devicePixelRatio||1;
  c.width = c.offsetWidth*dpr; c.height = c.offsetHeight*dpr;
  const ctx = c.getContext('2d'); ctx.scale(dpr,dpr);
  const W=c.offsetWidth, H=c.offsetHeight;
  ctx.clearRect(0,0,W,H);

  const sig = state.waveBuf;
  if (sig.length<4) {
    ctx.fillStyle='var(--muted)'; ctx.font='11px sans-serif'; ctx.textAlign='center';
    ctx.fillText('ממתין לאות...', W/2, H/2); return;
  }
  const show = Math.min(sig.length,160), seg=sig.slice(-show);
  const mn=Math.min(...seg), mx=Math.max(...seg)||1, rng=mx-mn||1;
  const q = state.signalQ;
  const col = q>40?'#ff3b5c':q>15?'#ffb830':'#4a6070';

  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,col+'44'); grad.addColorStop(1,col+'00');

  ctx.beginPath();
  seg.forEach((v,i)=>{ const x=i/(show-1)*W, y=H-((v-mn)/rng)*(H-6)-3; i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();

  ctx.beginPath();
  seg.forEach((v,i)=>{ const x=i/(show-1)*W, y=H-((v-mn)/rng)*(H-6)-3; i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.stroke();

  const lv=seg[seg.length-1], lx=W-1, ly=H-((lv-mn)/rng)*(H-6)-3;
  ctx.beginPath(); ctx.arc(lx,ly,3.5,0,Math.PI*2);
  ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=8; ctx.fill(); ctx.shadowBlur=0;
}

function drawHRChart() {
  const c = $('hrCanvas'); if(!c) return;
  const dpr=window.devicePixelRatio||1;
  c.width=c.offsetWidth*dpr; c.height=68*dpr;
  c.style.height='68px';
  const ctx=c.getContext('2d'); ctx.scale(dpr,dpr);
  const W=c.offsetWidth, H=68;
  ctx.clearRect(0,0,W,H);

  const data = state.hrHistory.length>=2 ? state.hrHistory : state.stressHistory;
  const col = state.hrHistory.length>=2 ? '#ff3b5c' : '#00d4aa';
  const show=Math.min(data.length,40), seg=data.slice(-show);
  const mn=Math.min(...seg)-2, mx=Math.max(...seg)+2, rng=mx-mn||1;

  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,col+'44'); grad.addColorStop(1,col+'00');
  ctx.beginPath();
  seg.forEach((v,i)=>{ const x=i/(show-1)*W, y=H-((v-mn)/rng)*(H-6)-3; i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath();
  seg.forEach((v,i)=>{ const x=i/(show-1)*W, y=H-((v-mn)/rng)*(H-6)-3; i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
  ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.lineJoin='round'; ctx.stroke();
}

let waveRAF=null;
function scheduleWaveRedraw() {
  cancelAnimationFrame(waveRAF);
  function loop(){ drawWave(); if(state.ppgRunning&&state.tab==='ppg') waveRAF=requestAnimationFrame(loop); }
  waveRAF=requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════════════════════════
// PPG ENGINE
// ══════════════════════════════════════════════════════════════════
const video=$('videoEl'), capCanvas=$('canvasEl');
const capCtx=capCanvas.getContext('2d',{willReadFrequently:true});
const SR=30, WIN=10, MAX=SR*WIN;

async function startPPG() {
  try {
    state.stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{exact:'environment'},width:{ideal:320},height:{ideal:240},frameRate:{ideal:30}}
    });
  } catch {
    try { state.stream = await navigator.mediaDevices.getUserMedia({video:{frameRate:{ideal:30}}}); }
    catch(e2) { alert('אין גישה למצלמה: '+e2.message); return; }
  }
  video.srcObject=state.stream; await video.play();
  state.track=state.stream.getVideoTracks()[0];
  state.torchWarn=false;
  try { await state.track.applyConstraints({advanced:[{torch:true}]}); }
  catch { state.torchWarn=true; }

  state.ppgRunning=true; state.redBuf=[]; state.tsBuf=[]; state.waveBuf=[];
  state.bpmHistory=[]; state.bpm=null; state.ppgElapsed=0;
  state.ppgTimer=setInterval(()=>{ state.ppgElapsed++; if(state.tab==='ppg') renderPartial(); }, 1000);
  ppgLoop();
  render();
}

function stopPPG() {
  state.ppgRunning=false;
  cancelAnimationFrame(state.ppgAF);
  clearInterval(state.ppgTimer);
  if(state.track){ try{state.track.applyConstraints({advanced:[{torch:false}]});}catch{} }
  if(state.stream){ state.stream.getTracks().forEach(t=>t.stop()); state.stream=null; }
  render();
}

function ppgLoop() {
  if(!state.ppgRunning) return;
  capCtx.drawImage(video,0,0,1,1);
  const px=capCtx.getImageData(0,0,1,1).data;
  const r=px[0]; const now=Date.now();
  state.redBuf.push(r); state.tsBuf.push(now);
  if(state.redBuf.length>MAX){ state.redBuf.shift(); state.tsBuf.shift(); }

  const q=sigQuality(state.redBuf);
  state.signalQ=q;

  const smoothed=bandpass(state.redBuf);
  state.waveBuf=smoothed;

  if(state.redBuf.length>=SR*5) {
    const res=computeBPM(smoothed, state.tsBuf);
    if(res) {
      state.bpmHistory.push(res.bpm);
      if(state.bpmHistory.length>8) state.bpmHistory.shift();
      const med=median(state.bpmHistory);
      state.bpm=med;
      if(!state.bpmMax||med>state.bpmMax) state.bpmMax=med;
      if(!state.bpmMin||med<state.bpmMin) state.bpmMin=med;
      // HRV from RR
      if(res.intervals.length>=3){
        const d=[];
        for(let i=1;i<res.intervals.length;i++) d.push(Math.abs(res.intervals[i]-res.intervals[i-1]));
        state.hrv=Math.round(Math.sqrt(d.reduce((a,v)=>a+v*v,0)/d.length));
      }
      // Update history
      state.hrHistory.push(med);
      if(state.hrHistory.length>40) state.hrHistory.shift();
      // Estimate stress from HR+HRV
      updateStress(med, state.hrv);
    }
  }
  // partial UI update for signal bar
  const sb=$('signalBar');
  if(sb){ const qc=q<15?'var(--muted)':q<35?'var(--amber)':'var(--green)'; sb.style.width=q+'%'; sb.style.background=qc; }

  state.ppgAF=requestAnimationFrame(ppgLoop);
}

function updateStress(hr, hrv) {
  // Heuristic stress estimate
  let s = state.stress;
  if(hr>90) s=clamp(s+0.4,0,100);
  else if(hr<65) s=clamp(s-0.5,0,100);
  else s=clamp(s+(Math.random()-.55)*.8,0,100);
  if(hrv){ if(hrv>50) s=clamp(s-0.3,0,100); else if(hrv<25) s=clamp(s+0.3,0,100); }
  if(state.breathRunning) s=clamp(s-0.6,0,100);
  state.stress=Math.round(s);
  state.stressHistory.push(s);
  if(state.stressHistory.length>40) state.stressHistory.shift();
  state.coherence=clamp(state.coherence+(Math.random()-.4)*.15, .5, 6.5);
  state.spo2=clamp(state.spo2+(Math.random()-.4)*.1, 96, 100);
}

// ── DSP ──────────────────────────────────────────────────────────
function sigQuality(buf){ if(buf.length<10) return 0; return Math.min(100,Math.round(stdDev(buf)*4)); }

function detrend(arr){
  const n=arr.length, mean=arr.reduce((a,b)=>a+b,0)/n;
  const xm=(n-1)/2;
  const slope=arr.reduce((a,v,i)=>a+(i-xm)*(v-mean),0)/arr.reduce((a,_,i)=>a+(i-xm)**2,0);
  return arr.map((v,i)=>v-mean-slope*(i-xm));
}
function movAvg(arr,w){ return arr.map((_,i)=>{ const s=arr.slice(Math.max(0,i-w+1),i+1); return s.reduce((a,b)=>a+b,0)/s.length; }); }
function bandpass(buf){
  if(buf.length<6) return buf;
  const d=detrend(buf);
  const fast=movAvg(d,3), slow=movAvg(d,15);
  return fast.map((v,i)=>v-(slow[i]||0));
}

function computeBPM(sig, times){
  if(sig.length<30) return null;
  const peaks=findPeaks(sig);
  if(peaks.length<3) return null;
  const intervals=[];
  for(let i=1;i<peaks.length;i++){
    const dt=times[peaks[i]]-times[peaks[i-1]];
    if(dt>300&&dt<2000) intervals.push(dt);
  }
  if(intervals.length<2) return null;
  const avg=intervals.reduce((a,b)=>a+b,0)/intervals.length;
  const bpm=Math.round(60000/avg);
  if(bpm<30||bpm>220) return null;
  return {bpm, intervals};
}

function findPeaks(sig){
  const peaks=[], minDist=10, thr=stdDev(sig)*.4;
  let last=-minDist;
  for(let i=2;i<sig.length-2;i++){
    if(i-last<minDist) continue;
    if(sig[i]>thr&&sig[i]>sig[i-1]&&sig[i]>sig[i-2]&&sig[i]>=sig[i+1]&&sig[i]>=sig[i+2]){
      peaks.push(i); last=i;
    }
  }
  return peaks;
}

// ══════════════════════════════════════════════════════════════════
// BREATHING ENGINE
// ══════════════════════════════════════════════════════════════════
function startBreath() {
  state.breathRunning=true;
  state.breathElapsed=0;
  state.breathStartStress=state.stress;
  const pat=PATTERNS[state.pattern];
  const phases=[
    {name:'inhale',dur:pat.inhale},
    ...(pat.hold>0?[{name:'hold',dur:pat.hold}]:[]),
    {name:'exhale',dur:pat.exhale},
  ];
  let pi=0, pt=0;
  const TICK=50;
  state.breathTimer=setInterval(()=>{
    state.breathElapsed=Math.floor((Date.now()-breathStart)/1000);
    pt+=TICK/1000;
    const cur=phases[pi];
    state.breathPhase=cur.name;
    state.breathProgress=clamp(pt/cur.dur,0,1);
    if(pt>=cur.dur){ pt=0; pi=(pi+1)%phases.length; }
    if(state.tab==='breath') renderPartial();
  },TICK);
  var breathStart=Date.now();
  render();
}

function stopBreath() {
  state.breathRunning=false;
  clearInterval(state.breathTimer);
  const reduction=Math.max(0,Math.round(state.breathStartStress-state.stress));
  state.breathSessions.push({
    time:new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}),
    pattern:state.pattern, dur:state.breathElapsed, reduction
  });
  render();
}

// ── partial render (only update changing numbers) ────────────────
function renderPartial() {
  // BPM
  const bv=$('bpmValue')||document.querySelector('.bpm-num');
  if(bv&&state.bpm) bv.textContent=state.bpm;
  // time
  const tv=$('timeVal');
  if(tv) tv.textContent=state.ppgElapsed+'s';
  // breath
  if(state.tab==='breath') {
    // Re-render breath circle cheaply — just full render at low cost
    // (React would diff; we do full for simplicity)
  }
}

// ══════════════════════════════════════════════════════════════════
// EVENT HANDLERS
// ══════════════════════════════════════════════════════════════════
function attachHandlers() {
  // pattern buttons
  document.querySelectorAll('[data-pat]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(state.breathRunning) return;
      state.pattern=btn.dataset.pat;
      render();
    });
  });
}

// Tabs
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    state.tab=t.dataset.tab;
    render();
    if(state.tab==='ppg'&&state.ppgRunning) scheduleWaveRedraw();
  });
});

// FAB buttons
$('fabPPG').addEventListener('click',()=>{
  if(!state.ppgRunning) startPPG();
  else stopPPG();
});
$('fabBreath').addEventListener('click',()=>{
  if(!state.breathRunning) startBreath();
  else stopBreath();
});

// Update FAB states
function updateFABs() {
  const fp=$('fabPPG'), fb=$('fabBreath');
  if(state.ppgRunning){ fp.textContent='⏹ עצור PPG'; fp.classList.remove('off'); }
  else { fp.textContent='📷 התחל PPG'; fp.classList.add('off'); }
  if(state.breathRunning){ fb.textContent='⏹ עצור נשימה'; fb.classList.remove('off'); }
  else { fb.textContent='▶ נשימה'; fb.classList.add('off'); }
}

// Observe state changes → update FABs
const origRender=render;
window.render=function(){
  origRender();
  updateFABs();
  // status dot
  const dot=$('statusDot'), badge=$('ppgBadge');
  if(state.ppgRunning){ dot.className='status-dot on'; badge.textContent='PPG פעיל'; badge.className='ppg-badge live'; }
  else { dot.className='status-dot'; badge.textContent='PPG כבוי'; badge.className='ppg-badge'; }
};
window.render=render; // reassign

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
render();
</script>
